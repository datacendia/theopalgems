[build]
  publish = "dist"
  # Install Playwright's Chromium (required by scripts/prerender.mjs) before building.
  # --with-deps pulls in the system libraries Chromium needs on Netlify's Linux builders.
  command = "npx playwright install chromium && npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Cache Playwright browsers between Netlify builds to avoid re-downloading ~170 MB every deploy.
  PLAYWRIGHT_BROWSERS_PATH = "/opt/buildhome/.cache/ms-playwright"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
