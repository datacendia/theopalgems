<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a1a1a"/>
  <!-- Diamond gem shape -->
  <polygon points="32,8 52,24 32,56 12,24" fill="none" stroke="#c9a96e" stroke-width="2"/>
  <!-- Top facets -->
  <polygon points="32,8 52,24 32,24" fill="#c9a96e" opacity="0.6"/>
  <polygon points="32,8 12,24 32,24" fill="#c9a96e" opacity="0.35"/>
  <!-- Bottom -->
  <polygon points="32,24 52,24 32,56" fill="#c9a96e" opacity="0.25"/>
  <polygon points="32,24 12,24 32,56" fill="#c9a96e" opacity="0.15"/>
  <!-- Center line -->
  <line x1="12" y1="24" x2="52" y2="24" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Inner facet lines -->
  <line x1="32" y1="8" x2="32" y2="24" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
</svg>
